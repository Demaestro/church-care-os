# Change this to a globally unique Fly app name before the first deploy.
app = "church-care-os"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HOSTNAME = "0.0.0.0"
  PORT = "3000"
  CARE_DB_PATH = "/data/care.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[mounts]
  source = "care_data"
  destination = "/data"
  initial_size = "1gb"
  snapshot_retention = 7

[[vm]]
  memory = "1gb"
  cpus = 1
  cpu_kind = "shared"
